<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Love Message 💖</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      color: #fff;
    }
    h1 {
      margin-top: 80px;
      font-size: 3em;
      text-shadow: 2px 2px 10px #ff6b81;
    }
    p {
      font-size: 1.5em;
      margin: 20px auto;
      width: 80%;
    }
    .heart {
      position: absolute;
      font-size: 2em;
      animation: float 6s infinite;
      color: red;
      opacity: 0.8;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(1); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }
    #secret {
      display: none;
      font-size: 2em;
      margin-top: 40px;
      text-shadow: 2px 2px 10px #ff6b81;
    }
    button {
      margin-top: 40px;
      padding: 15px 30px;
      font-size: 1.2em;
      border: none;
      border-radius: 30px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #ff4757;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <h1>💖 You Are My Forever 💖</h1>
  <p>Every heartbeat whispers your name.  
     This love will never fade — it only grows stronger.</p>

  <!-- Reveal button -->
  <button onclick="document.getElementById('secret').style.display='block'">
    💌 Click to Reveal Secret Message 💌
  </button>

  <!-- Hidden secret message -->
  <div id="secret">✨ You are the reason my world shines ✨</div>

  <!-- Background music -->
  <audio autoplay loop>
    <source src="C:\Users\USER\Desktop\MyLove" type="audio/mpeg">
  </audio>

  <!-- Floating hearts -->
  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (4 + Math.random() * 4) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 500);
  </script>
</body>
</html>
